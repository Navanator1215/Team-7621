<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driscoll's R&D Platform</title>
    {{ bootstrap.load_css() }}

    <style>
        body {
            background: #f4f7fb;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2937;
        }

        .page-header {
            background: linear-gradient(135deg, #0d6efd, #3b82f6);
            color: white;
            padding: 2.5rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
        }

        .page-header h1 {
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1rem;
        }

        .dashboard-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
        }

        .stat-label {
            font-size: 0.95rem;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0d6efd;
            margin: 0;
        }

        .section-title {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #111827;
        }

        .form-card {
            background: white;
            padding: 2rem;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
        }

        .btn-primary {
            border-radius: 0.75rem;
            font-weight: 600;
            padding: 0.7rem 1.2rem;
        }

        .form-control,
        .form-select {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.2);
        }

        .upload-note {
            font-size: 0.9rem;
            color: #6b7280;
        }

        .content-wrapper {
            margin-bottom: 3rem;
        }
    </style>
</head>
<body>

    <header class="page-header">
        <div class="container">
            <h1>Driscoll's R&D Platform</h1>
            <p>Manage agricultural trials, locations, media, and trial status in one place.</p>
        </div>
    </header>

    <main class="container content-wrapper">

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card dashboard-card stat-card">
                    <div class="stat-label">Total Trials</div>
                    <p class="stat-value">
                        {% if trials %}
                            {{ trials|length }}
                        {% else %}
                            0
                        {% endif %}
                    </p>
                </div>
            </div>
        </div>

        <div class="card dashboard-card form-card">
            <h2 class="section-title">Create Trial</h2>

            <form action="/create_trial" method="POST" enctype="multipart/form-data">
                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Crop</label>
                        <input
                            type="text"
                            class="form-control"
                            name="crop"
                            placeholder="Enter crop name"
                            required
                        >
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Location</label>
                        <input
                            type="text"
                            class="form-control"
                            name="location"
                            placeholder="Enter trial location"
                            required
                        >
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status" required>
                            <option selected disabled value="">Select status</option>
                            <option value="active">Active</option>
                            <option value="planned">Planned</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Upload Media</label>
                        <input type="file" name="media" class="form-control">
                        <div class="upload-note mt-1">Optional image or video for this trial.</div>
                    </div>

                    <div class="col-12 d-grid d-md-flex justify-content-md-end mt-3">
                        <button type="submit" class="btn btn-primary px-4">
                            Add Trial
                        </button>
                    </div>

                </div>
            </form>
        </div>

    </main>

</body>
</html>
